<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DeepSeek iMessage 風格對話</title>
    <!-- Font Awesome 6 (免費簡約圖標) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- PDF.js 輕量庫用於讀取PDF文字 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 深淺色主題變量 */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --message-user: #e5e5ea;
            --message-ai: #1c1c1e;
            --text-user: #000000;
            --text-ai: #ffffff;
            --border-color: #e9e9ef;
            --icon-color: #1c1c1e;
            --sidebar-bg: rgba(255,255,255,0.98);
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
            --meta-text: #8e8e93;
        }
        body.dark {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --message-user: #2c2c2e;
            --message-ai: #0a84ff;
            --text-user: #ffffff;
            --text-ai: #ffffff;
            --border-color: #38383a;
            --icon-color: #ffffff;
            --sidebar-bg: #1c1c1e;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --meta-text: #98989e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-user);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* 主容器 */
        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* 側邊欄 (折疊功能表) */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            box-shadow: 2px 0 12px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            border-right: 1px solid var(--border-color);
        }
        .sidebar.open {
            left: 0;
        }
        .sidebar-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-list {
            flex: 1;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 8px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .history-name {
            font-size: 16px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .history-actions i {
            margin-left: 12px;
            font-size: 14px;
            color: var(--icon-color);
            opacity: 0.7;
        }
        .theme-switch {
            margin-top: 30px;
            padding: 12px;
            text-align: center;
            border-top: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 主要聊天區域 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: var(--bg-primary);
        }
        .chat-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid var(--border-color);
            background: var(--bg-primary);
        }
        .menu-btn, .new-chat-btn {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--icon-color);
        }
        .search-bar {
            padding: 8px 12px;
            background: var(--bg-secondary);
            margin: 8px 12px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-bar i {
            color: var(--icon-color);
            opacity: 0.6;
        }
        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            color: var(--text-user);
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        /* iMessage 氣泡 */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            position: relative;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.ai {
            align-self: flex-start;
            width: 100%;  /* 全屏顯示效果 (佔滿寬度) */
            max-width: 100%;
        }
        .bubble {
            padding: 12px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
        }
        .user .bubble {
            background: var(--message-user);
            color: var(--text-user);
            border-bottom-right-radius: 4px;
        }
        .ai .bubble {
            background: var(--message-ai);
            color: var(--text-ai);
            border-bottom-left-radius: 4px;
        }
        .message-meta {
            font-size: 11px;
            color: var(--meta-text);
            margin-top: 4px;
            margin-left: 12px;
            margin-right: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .message-actions {
            position: absolute;
            right: -32px;
            top: 8px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: 0.2s;
        }
        .user .message-actions {
            right: auto;
            left: -32px;
        }
        .message:hover .message-actions {
            opacity: 1;
        }
        .message-actions button {
            background: var(--bg-secondary);
            border: none;
            border-radius: 20px;
            padding: 4px 6px;
            font-size: 12px;
            cursor: pointer;
            color: var(--icon-color);
        }
        .input-area {
            padding: 12px;
            background: var(--bg-primary);
            border-top: 0.5px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }
        .plus-menu-container {
            position: relative;
        }
        .plus-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--icon-color);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .popup-menu {
            position: absolute;
            bottom: 50px;
            left: 0;
            background: var(--bg-secondary);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 8px 0;
            min-width: 160px;
            display: none;
            z-index: 200;
            border: 0.5px solid var(--border-color);
        }
        .popup-menu.show {
            display: block;
        }
        .popup-menu div {
            padding: 12px 20px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .text-input {
            flex: 1;
            border: none;
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 16px;
            resize: none;
            outline: none;
            font-family: inherit;
            color: var(--text-user);
        }
        .send-btn {
            background: var(--message-ai);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
        }
        .token-estimate {
            font-size: 11px;
            color: var(--meta-text);
            padding: 0 8px;
        }
        .overlay {
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: rgba(0,0,0,0.3);
            z-index: 900;
            display: none;
        }
        /* iOS 風格彈窗 */
        .ios-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            background: var(--bg-secondary);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            z-index: 1100;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .ios-modal input, .ios-modal textarea {
            margin: 12px;
            padding: 10px;
            border-radius: 12px;
            border: 0.5px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-user);
        }
        .modal-buttons {
            display: flex;
            border-top: 0.5px solid var(--border-color);
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .bg-setting-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px;
        }
        i, button {
            cursor: pointer;
        }
        .full-width {
            width: 100%;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>對話記錄</span>
            <i class="fas fa-times" id="closeSidebar"></i>
        </div>
        <div class="history-list" id="historyList"></div>
        <div class="theme-switch" id="themeToggle">
            <i class="fas fa-moon"></i> <span>深色/淺色主題</span>
        </div>
    </div>
    <div class="chat-container">
        <div class="chat-header">
            <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
            <span style="font-weight:600;">DeepSeek · iMessage</span>
            <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-plus"></i></button>
        </div>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜尋對話內容">
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <div class="token-estimate" id="preSendToken">📊 預估本次發送總token: 0</div>
            <div class="input-wrapper">
                <div class="plus-menu-container">
                    <button class="plus-btn" id="plusMenuBtn"><i class="fas fa-plus-circle"></i></button>
                    <div class="popup-menu" id="plusPopup">
                        <div id="uploadTxtBtn"><i class="fas fa-file-alt"></i> 上傳 TXT</div>
                        <div id="uploadPdfBtn"><i class="fas fa-file-pdf"></i> 上傳 PDF</div>
                        <div id="bgSettingBtn"><i class="fas fa-sliders-h"></i> 背景設定</div>
                    </div>
                </div>
                <textarea rows="1" class="text-input" id="messageInput" placeholder="輸入訊息..."></textarea>
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>
<div class="overlay" id="overlay"></div>
<div class="ios-modal" id="apiKeyModal">
    <div style="padding:20px; text-align:center; font-weight:600;">🔑 輸入DeepSeek API Key</div>
    <input type="password" id="apiKeyInput" placeholder="sk-..." style="margin:8px 16px;">
    <div class="modal-buttons"><button id="saveApiKeyBtn">儲存</button></div>
</div>
<div class="ios-modal" id="bgModal">
    <div style="padding:20px; text-align:center; font-weight:600;">⚙️ 對話背景設定</div>
    <div class="bg-setting-content">
        <input type="text" id="roleName" placeholder="你的角色名稱 (例: 賢者)">
        <textarea id="bgContext" rows="2" placeholder="對話背景 (例: 我們在魔法森林探險...)"></textarea>
        <input type="text" id="forbiddenWords" placeholder="禁止詞 (用逗號分隔)">
    </div>
    <div class="modal-buttons"><button id="cancelBgBtn">取消</button><button id="saveBgBtn">儲存</button></div>
</div>
<script>
    // ---------- 全域變數 ----------
    let currentSessionId = Date.now().toString();
    let sessions = {};           // { id: { name, messages } }
    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    let backgroundConfig = {
        roleName: '助手',
        context: '你是一個專業且友善的AI助手。',
        bannedWords: ''
    };
    let currentSearchKeyword = '';
    
    // 載入儲存的背景設定
    const savedBg = localStorage.getItem('bg_config');
    if(savedBg) backgroundConfig = JSON.parse(savedBg);
    
    // 初始化預設會話
    function initSessions() {
        if(!localStorage.getItem('chat_sessions')) {
            const defaultMsg = [{ role: 'user', content: '你好！', id: Date.now()+1, wordCount:0, tokenEst:0 }, 
                                 { role: 'assistant', content: '您好！有什麼可以幫助您？', id: Date.now()+2, wordCount:0, tokenEst:0 }];
            sessions[currentSessionId] = { name: '新對話', messages: defaultMsg };
            localStorage.setItem('chat_sessions', JSON.stringify(sessions));
        } else {
            sessions = JSON.parse(localStorage.getItem('chat_sessions'));
            if(!sessions[currentSessionId]) currentSessionId = Object.keys(sessions)[0];
        }
    }
    // 儲存會話
    function saveSessions() {
        localStorage.setItem('chat_sessions', JSON.stringify(sessions));
    }
    // 計算字數+預測token (粗略 中英文混合 1 token ~ 0.6字 簡易估)
    function calcStats(text) {
        const length = text.length;
        const estimatedToken = Math.ceil(length / 2.2);
        return { wordCount: length, tokenEst: estimatedToken };
    }
    // 更新單則消息統計
    function attachStatsToMsg(msg) {
        const { wordCount, tokenEst } = calcStats(msg.content);
        msg.wordCount = wordCount;
        msg.tokenEst = tokenEst;
        return msg;
    }
    // 渲染訊息區域
    function renderMessages() {
        const container = document.getElementById('messagesArea');
        if(!container) return;
        const session = sessions[currentSessionId];
        if(!session) return;
        let messages = session.messages;
        if(currentSearchKeyword.trim() !== '') {
            const kw = currentSearchKeyword.toLowerCase();
            messages = messages.filter(m => m.content.toLowerCase().includes(kw));
        }
        container.innerHTML = '';
        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.role === 'user' ? 'user' : 'ai'}`;
            div.dataset.id = msg.id;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = msg.content;
            div.appendChild(bubble);
            const meta = document.createElement('div');
            meta.className = 'message-meta';
            meta.innerHTML = `<span>字數:${msg.wordCount || msg.content.length}</span> <span>預測token:${msg.tokenEst || Math.ceil(msg.content.length/2.2)}</span>`;
            // 按鈕區域
            const actions = document.createElement('div');
            actions.className = 'message-actions';
            if(msg.role === 'user') {
                const editBtn = document.createElement('button');
                editBtn.innerHTML = '<i class="fas fa-edit"></i>';
                editBtn.title = '修改訊息並重新生成';
                editBtn.onclick = (e) => { e.stopPropagation(); editUserMessage(msg.id); };
                actions.appendChild(editBtn);
            } else if(msg.role === 'assistant') {
                const copyBtn = document.createElement('button');
                copyBtn.innerHTML = '<i class="fas fa-copy"></i>';
                copyBtn.title = '一鍵複製';
                copyBtn.onclick = (e) => { e.stopPropagation(); navigator.clipboard.writeText(msg.content); alert('已複製回覆'); };
                actions.appendChild(copyBtn);
            }
            const delBtn = document.createElement('button');
            delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
            delBtn.title = '刪除此訊息及之後對話';
            delBtn.onclick = (e) => { e.stopPropagation(); deleteMessageAndAfter(msg.id); };
            actions.appendChild(delBtn);
            div.appendChild(meta);
            div.appendChild(actions);
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
        updatePreSendToken();
    }
    // 刪除訊息(包含之後所有)
    function deleteMessageAndAfter(msgId) {
        let session = sessions[currentSessionId];
        const idx = session.messages.findIndex(m => m.id == msgId);
        if(idx !== -1) {
            session.messages = session.messages.slice(0, idx);
            saveSessions();
            renderMessages();
        }
    }
    // 編輯使用者訊息
    function editUserMessage(msgId) {
        const session = sessions[currentSessionId];
        const msgIndex = session.messages.findIndex(m => m.id == msgId);
        if(msgIndex === -1 || session.messages[msgIndex].role !== 'user') return;
        const newContent = prompt('編輯訊息內容', session.messages[msgIndex].content);
        if(!newContent || newContent.trim() === '') return;
        session.messages[msgIndex].content = newContent;
        attachStatsToMsg(session.messages[msgIndex]);
        // 刪除該訊息之後的所有訊息
        session.messages = session.messages.slice(0, msgIndex+1);
        saveSessions();
        renderMessages();
        // 重新產生 AI 回覆
        generateAIResponse();
    }
    // 發送前預估總token
    function updatePreSendToken() {
        const inputText = document.getElementById('messageInput').value;
        const session = sessions[currentSessionId];
        let fullContext = buildFullContextForAPI(session.messages, inputText);
        let totalStr = JSON.stringify(fullContext);
        const totalToken = Math.ceil(totalStr.length / 2.2);
        document.getElementById('preSendToken').innerHTML = `📊 預估本次發送總token: ${totalToken}`;
    }
    // 構建API請求（包含背景、歷史+新訊息）
    function buildFullContextForAPI(historyMessages, newUserMsg = null) {
        let systemPrompt = `${backgroundConfig.roleName}\n背景設定: ${backgroundConfig.context}\n禁止詞: ${backgroundConfig.bannedWords}\n請遵守禁止詞，避免出現這些詞語。`;
        let messages = [{ role: 'system', content: systemPrompt }];
        for(let msg of historyMessages) {
            messages.push({ role: msg.role, content: msg.content });
        }
        if(newUserMsg) messages.push({ role: 'user', content: newUserMsg });
        return messages;
    }
    // 呼叫DeepSeek API
    async function callDeepSeek(messagesArray) {
        if(!apiKey) { alert('請先設定API Key'); document.getElementById('apiKeyModal').style.display = 'flex'; return null; }
        try {
            const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model: 'deepseek-chat', messages: messagesArray, stream: false })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            return data.choices[0].message.content;
        } catch(e) { alert(`API錯誤: ${e.message}`); return null; }
    }
    // 生成AI回覆(依據目前會話消息最後一則為用戶)
    async function generateAIResponse() {
        const session = sessions[currentSessionId];
        if(session.messages.length === 0 || session.messages[session.messages.length-1].role !== 'user') return;
        const apiMessages = buildFullContextForAPI(session.messages.slice(0, -1), session.messages[session.messages.length-1].content);
        const reply = await callDeepSeek(apiMessages);
        if(reply) {
            const newAssistantMsg = { role: 'assistant', content: reply, id: Date.now() };
            attachStatsToMsg(newAssistantMsg);
            session.messages.push(newAssistantMsg);
            saveSessions();
            renderMessages();
        }
    }
    // 發送新消息
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        let text = input.value.trim();
        if(!text) return;
        if(!apiKey) { document.getElementById('apiKeyModal').style.display = 'flex'; return; }
        const session = sessions[currentSessionId];
        const newMsg = { role: 'user', content: text, id: Date.now() };
        attachStatsToMsg(newMsg);
        session.messages.push(newMsg);
        saveSessions();
        renderMessages();
        input.value = '';
        updatePreSendToken();
        await generateAIResponse();
    }
    // 新增對話
    function newConversation() {
        const newId = Date.now().toString();
        sessions[newId] = { name: `新對話 ${Object.keys(sessions).length+1}`, messages: [] };
        currentSessionId = newId;
        saveSessions();
        renderMessages();
        renderHistoryList();
        updatePreSendToken();
    }
    // 側邊欄歷史列表渲染
    function renderHistoryList() {
        const historyDiv = document.getElementById('historyList');
        historyDiv.innerHTML = '';
        for(let [id, session] of Object.entries(sessions)) {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span class="history-name">${session.name}</span><div class="history-actions"><i class="fas fa-pen" data-id="${id}" data-action="rename"></i><i class="fas fa-trash" data-id="${id}" data-action="delete"></i></div>`;
            item.addEventListener('click', (e) => { if(e.target.tagName!=='I') switchSession(id); });
            historyDiv.appendChild(item);
        }
        document.querySelectorAll('.history-actions i[data-action="rename"]').forEach(icon => {
            icon.addEventListener('click', (e) => { e.stopPropagation(); renameSession(icon.dataset.id); });
        });
        document.querySelectorAll('.history-actions i[data-action="delete"]').forEach(icon => {
            icon.addEventListener('click', (e) => { e.stopPropagation(); deleteSession(icon.dataset.id); });
        });
    }
    function switchSession(id) { currentSessionId = id; renderMessages(); renderHistoryList(); document.getElementById('sidebar').classList.remove('open'); }
    function renameSession(id) { let newName = prompt('新名稱', sessions[id].name); if(newName) { sessions[id].name = newName; saveSessions(); renderHistoryList(); } }
    function deleteSession(id) { if(Object.keys(sessions).length===1) { alert('至少保留一個對話'); return; } delete sessions[id]; if(currentSessionId===id) currentSessionId=Object.keys(sessions)[0]; saveSessions(); renderHistoryList(); renderMessages(); }
    // 上傳檔案 (TXT / PDF)
    function uploadFile(type) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = type === 'txt' ? '.txt' : '.pdf';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            let text = '';
            if(type === 'txt') {
                text = await file.text();
            } else if(type === 'pdf') {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = '';
                for(let i=1;i<=pdf.numPages;i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const strings = content.items.map(item => item.str);
                    fullText += strings.join(' ') + '\n';
                }
                text = fullText;
            }
            const inputArea = document.getElementById('messageInput');
            inputArea.value += (inputArea.value ? '\n' : '') + text;
            updatePreSendToken();
        };
        input.click();
    }
    // 背景設定彈窗
    function showBgModal() {
        document.getElementById('roleName').value = backgroundConfig.roleName;
        document.getElementById('bgContext').value = backgroundConfig.context;
        document.getElementById('forbiddenWords').value = backgroundConfig.bannedWords;
        document.getElementById('bgModal').style.display = 'flex';
    }
    function saveBgSettings() {
        backgroundConfig.roleName = document.getElementById('roleName').value || '助手';
        backgroundConfig.context = document.getElementById('bgContext').value || '你是一個專業AI';
        backgroundConfig.bannedWords = document.getElementById('forbiddenWords').value;
        localStorage.setItem('bg_config', JSON.stringify(backgroundConfig));
        document.getElementById('bgModal').style.display = 'none';
        alert('背景設定已更新，將於下一輪對話生效');
    }
    // API Key 模態
    function showApiModal() { document.getElementById('apiKeyModal').style.display = 'flex'; }
    function saveApiKey() { apiKey = document.getElementById('apiKeyInput').value; localStorage.setItem('deepseek_api_key', apiKey); document.getElementById('apiKeyModal').style.display = 'none'; }
    // 主題切換
    function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }
    
    // 監聽輸入框變動更新預估token
    document.getElementById('messageInput').addEventListener('input', updatePreSendToken);
    // 初始化
    function init() {
        initSessions();
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        if(apiKey === '') setTimeout(()=> showApiModal(), 500);
        renderMessages();
        renderHistoryList();
        // 事件綁定
        document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.add('open');
        document.getElementById('closeSidebar').onclick = () => document.getElementById('sidebar').classList.remove('open');
        document.getElementById('newChatBtn').onclick = newConversation;
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('plusMenuBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('plusPopup').classList.toggle('show'); };
        document.getElementById('uploadTxtBtn').onclick = () => uploadFile('txt');
        document.getElementById('uploadPdfBtn').onclick = () => uploadFile('pdf');
        document.getElementById('bgSettingBtn').onclick = () => { showBgModal(); document.getElementById('plusPopup').classList.remove('show'); };
        document.getElementById('cancelBgBtn').onclick = () => document.getElementById('bgModal').style.display = 'none';
        document.getElementById('saveBgBtn').onclick = saveBgSettings;
        document.getElementById('saveApiKeyBtn').onclick = saveApiKey;
        document.getElementById('themeToggle').onclick = toggleTheme;
        document.getElementById('overlay').onclick = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('plusPopup').classList.remove('show'); };
        document.getElementById('searchInput').addEventListener('input', (e) => { currentSearchKeyword = e.target.value; renderMessages(); });
        window.onclick = (e) => { if(!e.target.closest('.plus-menu-container')) document.getElementById('plusPopup').classList.remove('show'); };
    }
    init();
</script>
</body>
</html>
