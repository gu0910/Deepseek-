<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek 簡約對話</title>
    <!-- Font Awesome 6 (免費圖標，強制黑白灰) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- PDF.js 核心庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        /* 淺色主題 (默認) */
        :root {
            --bg-page: #f5f5f7;
            --surface: #ffffff;
            --surface-secondary: #f0f0f2;
            --border: #e5e5ea;
            --text-primary: #1c1c1e;
            --text-secondary: #6c6c70;
            --icon-color: #3a3a3c;
            --bubble-user: #e9e9ef;
            --bubble-ai-bg: transparent;
            --bubble-ai-text: #1c1c1e;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --overlay-bg: rgba(0,0,0,0.4);
        }

        body.dark {
            --bg-page: #000000;
            --surface: #1c1c1e;
            --surface-secondary: #2c2c2e;
            --border: #38383a;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --icon-color: #d9d9d9;
            --bubble-user: #2c2c2e;
            --bubble-ai-bg: transparent;
            --bubble-ai-text: #ffffff;
            --shadow-sm: 0 1px 3px rgba(255,255,255,0.05);
            --overlay-bg: rgba(0,0,0,0.7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            touch-action: pan-y;
        }

        /* 佈局 */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        /* 頂欄 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        .menu-btn, .new-chat-btn {
            background: transparent;
            border: none;
            font-size: 24px;
            color: var(--icon-color);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
        }
        .menu-btn:active, .new-chat-btn:active { background: var(--surface-secondary); }
        .title { font-weight: 600; font-size: 18px; letter-spacing: -0.3px; }

        /* 主內容 訊息區域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px 20px 12px;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* AI 回覆全屏顯示 (無氣泡) */
        .message-ai {
            background: var(--bubble-ai-bg);
            padding: 4px 0;
            border-bottom: none;
            width: 100%;
        }
        .message-ai .content {
            font-size: 1rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--bubble-ai-text);
        }
        /* 用戶氣泡 */
        .message-user {
            display: flex;
            justify-content: flex-end;
        }
        .message-user .bubble {
            max-width: 85%;
            background: var(--bubble-user);
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 1rem;
            line-height: 1.45;
            color: var(--text-primary);
            word-break: break-word;
        }

        /* 消息底部工具欄: 字數 + 按鈕組 */
        .msg-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            gap: 12px;
        }
        .msg-actions {
            display: flex;
            gap: 12px;
        }
        .msg-actions button {
            background: transparent;
            border: none;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
        }
        .char-count {
            font-size: 11px;
        }

        /* 輸入區域 */
        .input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 10px 12px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }
        .input-wrapper {
            flex: 1;
            background: var(--surface-secondary);
            border-radius: 28px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            font-size: 16px;
            font-family: inherit;
            color: var(--text-primary);
            max-height: 120px;
            min-height: 28px;
        }
        .input-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .icon-btn {
            background: transparent;
            border: none;
            font-size: 22px;
            color: var(--icon-color);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
        }
        .send-btn {
            background: var(--surface-secondary);
            border-radius: 30px;
        }
        .float-bottom {
            position: fixed;
            bottom: 80px;
            right: 16px;
            background: var(--surface);
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 15;
        }

        /* 側邊欄 (折疊功能表) */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 85%;
            max-width: 320px;
            height: 100%;
            background: var(--surface);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(0,0,0,0.1);
            border-right: 1px solid var(--border);
        }
        .sidebar.open {
            transform: translateX(0);
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .search-conv {
            background: var(--surface-secondary);
            border: none;
            border-radius: 12px;
            padding: 10px 12px;
            width: 100%;
            margin-bottom: 20px;
            color: var(--text-primary);
            font-size: 15px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 8px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .history-name {
            flex: 1;
            font-size: 15px;
            font-weight: 500;
        }
        .history-actions button {
            background: none;
            border: none;
            margin-left: 10px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .theme-switch-btn {
            margin-top: 30px;
            width: 100%;
            padding: 12px;
            background: var(--surface-secondary);
            border: none;
            border-radius: 28px;
            color: var(--text-primary);
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* iOS 彈窗樣式 */
        .ios-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .ios-modal .modal-card {
            background: var(--surface);
            width: 85%;
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .ios-modal input {
            width: 100%;
            padding: 14px;
            margin: 20px 0;
            background: var(--surface-secondary);
            border: none;
            border-radius: 14px;
            font-size: 16px;
            color: var(--text-primary);
        }
        .ios-modal button {
            background: var(--surface-secondary);
            border: none;
            padding: 12px 20px;
            border-radius: 28px;
            font-weight: 600;
            margin: 0 6px;
        }

        /* 左下角 + 菜單彈出 */
        .plus-menu {
            position: fixed;
            bottom: 70px;
            left: 20px;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            z-index: 50;
            width: 200px;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .plus-menu.show {
            display: flex;
        }
        .plus-menu button {
            background: transparent;
            border: none;
            padding: 14px 18px;
            text-align: left;
            font-size: 16px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
        }
        /* 全屏編輯器 */
        .fullscreen-editor {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--surface);
            z-index: 300;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .fullscreen-editor textarea {
            flex: 1;
            background: var(--surface-secondary);
            border: none;
            border-radius: 20px;
            padding: 16px;
            font-size: 16px;
            color: var(--text-primary);
            margin: 16px 0;
        }
        .bg-setting-modal {
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: var(--overlay-bg);
            z-index: 250;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-card {
            background: var(--surface);
            width: 85%;
            border-radius: 28px;
            padding: 20px;
        }
        .bg-card input, .bg-card textarea {
            width: 100%;
            margin: 8px 0 16px;
            padding: 12px;
            background: var(--surface-secondary);
            border: none;
            border-radius: 14px;
            color: var(--text-primary);
        }
        button {
            cursor: pointer;
        }
        .loading-dots:after {
            content: " ...";
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots { 0%,20%{content:".";}40%{content:"..";}60%,100%{content:"...";} }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        <div class="title">DeepSeek · 簡約對話</div>
        <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-plus"></i></button>
    </div>
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-area">
        <button class="icon-btn" id="leftPlusBtn"><i class="fas fa-plus"></i></button>
        <div class="input-wrapper">
            <textarea id="messageInput" rows="1" placeholder="發送訊息..."></textarea>
        </div>
        <div class="input-actions">
            <button class="icon-btn" id="expandInputBtn"><i class="fas fa-expand"></i></button>
            <button class="icon-btn send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <button class="float-bottom icon-btn" id="scrollToBottomBtn"><i class="fas fa-arrow-down"></i></button>
    <!-- 左下角plus菜單 -->
    <div id="plusMenu" class="plus-menu">
        <button id="uploadFileBtn"><i class="fas fa-file-alt"></i> 上傳 TXT/PDF</button>
        <button id="bgSettingBtn"><i class="fas fa-sliders-h"></i> 背景設定</button>
        <input type="file" id="fileInput" accept=".txt,.pdf" style="display:none" />
    </div>
    <!-- 側邊欄 -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span>功能表</span>
            <button class="icon-btn" id="closeSidebarBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-content">
            <input type="text" id="searchHistoryInput" class="search-conv" placeholder="搜尋對話記錄...">
            <div id="historyList"></div>
            <button id="themeToggleSidebar" class="theme-switch-btn"><i class="fas fa-moon"></i> 切換深色模式</button>
            <button id="resetApiBtn" class="theme-switch-btn" style="margin-top:12px"><i class="fas fa-key"></i> 更換 API Key</button>
        </div>
    </div>
</div>
<script>
    // ---------- 全域變數 ----------
    let apiKey = localStorage.getItem("deepseek_api_key") || "";
    let currentChatId = null;
    let chats = {};          // { chatId: { id, title, messages: [{role, content, timestamp}] } }
    let chatList = [];       // 順序陣列
    let currentTheme = localStorage.getItem("theme") || "light";
    // 背景設定
    let bgSetting = {
        roleName: "",
        scenario: "",
        bannedWords: ""
    };
    const loadBgSetting = () => {
        const saved = localStorage.getItem("bg_setting");
        if(saved) bgSetting = JSON.parse(saved);
    };
    const saveBgSetting = () => localStorage.setItem("bg_setting", JSON.stringify(bgSetting));
    
    // 初始化demo對話
    function initDemoChat() {
        if(Object.keys(chats).length === 0){
            const id = Date.now().toString();
            chats[id] = { id, title: "新對話", messages: [] };
            chatList = [id];
            currentChatId = id;
            saveChatsToLocal();
        }
    }
    function saveChatsToLocal() {
        localStorage.setItem("deepseek_chats", JSON.stringify({ chats, chatList, currentChatId }));
    }
    function loadChatsFromLocal() {
        const data = localStorage.getItem("deepseek_chats");
        if(data){
            const parsed = JSON.parse(data);
            chats = parsed.chats;
            chatList = parsed.chatList;
            currentChatId = parsed.currentChatId;
        } else {
            initDemoChat();
        }
        if(!chats[currentChatId]) currentChatId = chatList[0];
        renderHistoryList();
        renderCurrentChat();
    }
    // 儲存當前聊天
    function saveCurrentChat() {
        if(currentChatId && chats[currentChatId]) saveChatsToLocal();
    }
    // 新增對話
    function newChat() {
        const newId = Date.now().toString();
        chats[newId] = { id: newId, title: "新對話", messages: [] };
        chatList.unshift(newId);
        currentChatId = newId;
        saveChatsToLocal();
        renderHistoryList();
        renderCurrentChat();
    }
    function deleteChat(chatId) {
        if(chatList.length === 1) {
            if(confirm("刪除後將無對話，將建立新對話")){
                delete chats[chatId];
                chatList = [];
                initDemoChat();
                saveChatsToLocal();
                renderHistoryList();
                renderCurrentChat();
            }
            return;
        }
        delete chats[chatId];
        const idx = chatList.indexOf(chatId);
        if(idx !== -1) chatList.splice(idx,1);
        if(currentChatId === chatId) currentChatId = chatList[0];
        saveChatsToLocal();
        renderHistoryList();
        renderCurrentChat();
    }
    function renameChat(chatId, newName) {
        if(chats[chatId]) chats[chatId].title = newName;
        saveChatsToLocal();
        renderHistoryList();
    }
    // 渲染歷史列表(含搜索)
    function renderHistoryList() {
        const container = document.getElementById("historyList");
        const keyword = document.getElementById("searchHistoryInput").value.toLowerCase();
        let filtered = chatList.filter(id => chats[id].title.toLowerCase().includes(keyword));
        container.innerHTML = filtered.map(id => {
            const chat = chats[id];
            return `<div class="history-item" data-id="${id}">
                        <div class="history-name">${escapeHtml(chat.title)}</div>
                        <div class="history-actions">
                            <button class="rename-history" data-id="${id}"><i class="fas fa-pen"></i></button>
                            <button class="del-history" data-id="${id}"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>`;
        }).join('');
        // 點擊切換對話
        document.querySelectorAll('.history-item').forEach(el => {
            el.addEventListener('click', (e) => {
                if(e.target.closest('.rename-history') || e.target.closest('.del-history')) return;
                const cid = el.dataset.id;
                if(cid) { currentChatId = cid; saveChatsToLocal(); renderCurrentChat(); renderHistoryList(); }
            });
        });
        document.querySelectorAll('.rename-history').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const cid = btn.dataset.id;
                const newName = prompt("輸入新名稱", chats[cid].title);
                if(newName) renameChat(cid, newName);
            });
        });
        document.querySelectorAll('.del-history').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if(confirm("刪除此對話?")) deleteChat(btn.dataset.id);
            });
        });
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    // 渲染當前對話 (消息)
    async function renderCurrentChat() {
        const container = document.getElementById("chatContainer");
        if(!currentChatId || !chats[currentChatId]) return;
        const messages = chats[currentChatId].messages || [];
        container.innerHTML = "";
        for(let idx=0; idx<messages.length; idx++){
            const msg = messages[idx];
            const isUser = msg.role === "user";
            const charCount = msg.content.length;
            const div = document.createElement("div");
            div.className = isUser ? "message-user" : "message-ai";
            if(!isUser){
                div.innerHTML = `<div class="content">${escapeHtml(msg.content)}</div>
                                <div class="msg-footer"><span class="char-count">字數: ${charCount}</span>
                                <div class="msg-actions">
                                    <button class="copy-msg" data-msg="${escapeHtml(msg.content).replace(/"/g, '&quot;')}"><i class="far fa-copy"></i></button>
                                    <button class="regenerate-msg" data-idx="${idx}"><i class="fas fa-sync-alt"></i></button>
                                    <button class="delete-msg" data-idx="${idx}"><i class="fas fa-trash-alt"></i></button>
                                </div></div>`;
            } else {
                div.innerHTML = `<div class="bubble">${escapeHtml(msg.content)}</div>
                                <div class="msg-footer"><span class="char-count">字數: ${charCount}</span>
                                <div class="msg-actions">
                                    <button class="edit-msg" data-idx="${idx}"><i class="fas fa-edit"></i></button>
                                    <button class="delete-msg" data-idx="${idx}"><i class="fas fa-trash-alt"></i></button>
                                </div></div>`;
            }
            container.appendChild(div);
        }
        // 綁定按鈕事件
        document.querySelectorAll(".copy-msg").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const raw = btn.getAttribute("data-msg");
                navigator.clipboard.writeText(raw);
            });
        });
        document.querySelectorAll(".delete-msg").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const idx = parseInt(btn.dataset.idx);
                if(!isNaN(idx)){
                    chats[currentChatId].messages.splice(idx,1);
                    saveCurrentChat();
                    renderCurrentChat();
                }
            });
        });
        document.querySelectorAll(".edit-msg").forEach(btn => {
            btn.addEventListener("click", async (e) => {
                const idx = parseInt(btn.dataset.idx);
                const oldMsg = chats[currentChatId].messages[idx];
                if(oldMsg && oldMsg.role === "user"){
                    const newText = prompt("修改訊息:", oldMsg.content);
                    if(newText && newText.trim()){
                        oldMsg.content = newText;
                        // 刪除該訊息之後的所有訊息
                        chats[currentChatId].messages = chats[currentChatId].messages.slice(0, idx+1);
                        saveCurrentChat();
                        renderCurrentChat();
                        // 重新呼叫API
                        await sendMessageToAI(true);
                    }
                }
            });
        });
        document.querySelectorAll(".regenerate-msg").forEach(btn => {
            btn.addEventListener("click", async (e) => {
                const idx = parseInt(btn.dataset.idx);
                const messagesArr = chats[currentChatId].messages;
                if(messagesArr[idx] && messagesArr[idx].role === "assistant"){
                    // 刪除該助理訊息及之後，重新請求
                    chats[currentChatId].messages = messagesArr.slice(0, idx);
                    saveCurrentChat();
                    renderCurrentChat();
                    await sendMessageToAI(true);
                }
            });
        });
        scrollToBottom();
    }
    async function sendMessageToAI(isRegenerate = false) {
        if(!apiKey) { showApiKeyModal(); return false; }
        const messages = chats[currentChatId]?.messages || [];
        let lastUserMsg = null;
        if(!isRegenerate){
            const inputEl = document.getElementById("messageInput");
            const text = inputEl.value.trim();
            if(!text) return false;
            // 添加用戶消息
            chats[currentChatId].messages.push({ role: "user", content: text, timestamp: Date.now() });
            inputEl.value = "";
            saveCurrentChat();
            renderCurrentChat();
            lastUserMsg = text;
        }
        // 構建system prompt
        let systemPrompt = "";
        if(bgSetting.roleName) systemPrompt += `你的角色是：${bgSetting.roleName}。\n`;
        if(bgSetting.scenario) systemPrompt += `對話背景：${bgSetting.scenario}。\n`;
        if(bgSetting.bannedWords) systemPrompt += `禁止出現以下詞語：${bgSetting.bannedWords}。請嚴格遵守。\n`;
        systemPrompt += "請用繁體中文回覆。";
        const historyMsgs = chats[currentChatId].messages.map(m => ({ role: m.role, content: m.content }));
        const apiMessages = [{ role: "system", content: systemPrompt }, ...historyMsgs];
        try {
            // 顯示加載提示
            const loadingId = Date.now();
            chats[currentChatId].messages.push({ role: "assistant", content: "（思考中...）", isLoading: true });
            saveCurrentChat();
            renderCurrentChat();
            const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                body: JSON.stringify({ model: "deepseek-chat", messages: apiMessages, stream: false })
            });
            if(!response.ok) throw new Error(`API錯誤: ${response.status}`);
            const data = await response.json();
            const reply = data.choices[0].message.content;
            // 替換最後一條加載訊息
            const msgs = chats[currentChatId].messages;
            if(msgs[msgs.length-1]?.isLoading) msgs.pop();
            msgs.push({ role: "assistant", content: reply, timestamp: Date.now() });
            saveCurrentChat();
            renderCurrentChat();
        } catch(err) {
            const msgs = chats[currentChatId].messages;
            if(msgs[msgs.length-1]?.isLoading) msgs.pop();
            msgs.push({ role: "assistant", content: `錯誤: ${err.message}`, timestamp: Date.now() });
            saveCurrentChat();
            renderCurrentChat();
        }
        return true;
    }
    function scrollToBottom() {
        const container = document.getElementById("chatContainer");
        container.scrollTop = container.scrollHeight;
    }
    function showApiKeyModal() {
        const modalDiv = document.createElement("div");
        modalDiv.className = "ios-modal";
        modalDiv.innerHTML = `<div class="modal-card"><h3>🔑 API 金鑰</h3><input type="password" id="apiKeyInput" placeholder="請輸入 DeepSeek API Key"><div><button id="saveApiBtn">儲存</button></div></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById("saveApiBtn").onclick = () => {
            const val = document.getElementById("apiKeyInput").value.trim();
            if(val){
                apiKey = val;
                localStorage.setItem("deepseek_api_key", apiKey);
                modalDiv.remove();
            } else alert("請輸入有效的 API Key");
        };
    }
    // 主題切換
    function setTheme(theme){
        currentTheme = theme;
        if(theme === "dark") document.body.classList.add("dark");
        else document.body.classList.remove("dark");
        localStorage.setItem("theme", theme);
    }
    // 背景設定模態框
    function showBgSettingModal(){
        const modal = document.createElement("div");
        modal.className = "bg-setting-modal";
        modal.innerHTML = `<div class="bg-card"><h3>背景設定</h3><label>角色名稱</label><input id="roleNameInput" placeholder="例: 友善助理"><label>對話背景</label><textarea id="scenarioInput" rows="2" placeholder="情境描述"></textarea><label>禁止詞</label><input id="bannedInput" placeholder="敏感詞, 禁用語"><div style="display:flex; justify-content:space-between; margin-top:20px;"><button id="cancelBgBtn">取消</button><button id="saveBgBtn">儲存</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById("roleNameInput").value = bgSetting.roleName;
        document.getElementById("scenarioInput").value = bgSetting.scenario;
        document.getElementById("bannedInput").value = bgSetting.bannedWords;
        document.getElementById("saveBgBtn").onclick = () => {
            bgSetting.roleName = document.getElementById("roleNameInput").value;
            bgSetting.scenario = document.getElementById("scenarioInput").value;
            bgSetting.bannedWords = document.getElementById("bannedInput").value;
            saveBgSetting();
            modal.remove();
        };
        document.getElementById("cancelBgBtn").onclick = () => modal.remove();
    }
    // 上傳文件 TXT/PDF
    async function uploadFile(file){
        if(file.type === "text/plain"){
            const text = await file.text();
            document.getElementById("messageInput").value = text;
        } else if(file.type === "application/pdf"){
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";
            for(let i=1;i<=pdf.numPages;i++){
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const strings = content.items.map(item => item.str);
                fullText += strings.join(" ") + "\n";
            }
            document.getElementById("messageInput").value = fullText;
        } else alert("請上傳 txt 或 pdf 檔案");
    }
    // 全屏編輯器
    function showFullscreenEditor(){
        const editorDiv = document.createElement("div");
        editorDiv.className = "fullscreen-editor";
        editorDiv.innerHTML = `<textarea id="fsTextarea">${escapeHtml(document.getElementById("messageInput").value)}</textarea><div><button id="fsSaveBtn">套用</button> <button id="fsCancelBtn">取消</button></div>`;
        document.body.appendChild(editorDiv);
        document.getElementById("fsSaveBtn").onclick = () => {
            document.getElementById("messageInput").value = document.getElementById("fsTextarea").value;
            editorDiv.remove();
        };
        document.getElementById("fsCancelBtn").onclick = () => editorDiv.remove();
    }
    // 初始化事件與UI
    window.onload = () => {
        loadBgSetting();
        if(apiKey === "") showApiKeyModal();
        loadChatsFromLocal();
        setTheme(currentTheme);
        document.getElementById("menuBtn").onclick = () => document.getElementById("sidebar").classList.add("open");
        document.getElementById("closeSidebarBtn").onclick = () => document.getElementById("sidebar").classList.remove("open");
        document.getElementById("newChatBtn").onclick = () => newChat();
        document.getElementById("sendBtn").onclick = () => sendMessageToAI(false);
        document.getElementById("scrollToBottomBtn").onclick = () => scrollToBottom();
        const leftPlus = document.getElementById("leftPlusBtn");
        const plusMenu = document.getElementById("plusMenu");
        leftPlus.onclick = (e) => { e.stopPropagation(); plusMenu.classList.toggle("show"); };
        document.addEventListener("click", () => plusMenu.classList.remove("show"));
        document.getElementById("uploadFileBtn").onclick = () => { document.getElementById("fileInput").click(); plusMenu.classList.remove("show"); };
        document.getElementById("bgSettingBtn").onclick = () => { showBgSettingModal(); plusMenu.classList.remove("show"); };
        document.getElementById("fileInput").onchange = (e) => { if(e.target.files[0]) uploadFile(e.target.files[0]); e.target.value=""; };
        document.getElementById("expandInputBtn").onclick = () => showFullscreenEditor();
        document.getElementById("themeToggleSidebar").onclick = () => { const newTheme = currentTheme === "light" ? "dark" : "light"; setTheme(newTheme); };
        document.getElementById("resetApiBtn").onclick = () => showApiKeyModal();
        document.getElementById("messageInput").addEventListener("keydown", (e) => {
            if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendMessageToAI(false); }
        });
        document.getElementById("searchHistoryInput").addEventListener("input", () => renderHistoryList());
        window.addEventListener("resize", () => { });
    };
</script>
</body>
</html>
